<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEI DB — 図解ライブラリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a; --surface:#1e293b; --surface2:#263248; --border:#2d3f55;
  --text:#e2e8f0; --muted:#64748b; --soft:#94a3b8;
  --accent:#8fc31f; --accent2:#6fa015;
  --positive:#22c55e; --negative:#f87171;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh}

/* NAV */
.nav{background:#0d1929;border-bottom:1px solid #1e2d40;display:flex;align-items:center;padding:0 24px;height:52px;gap:0;position:sticky;top:0;z-index:100}
.nav-home{color:#64748b;font-size:11px;text-decoration:none;padding:10px 14px;border-bottom:3px solid transparent;display:flex;align-items:center;gap:5px;margin-right:8px;font-weight:500;white-space:nowrap}
.nav-home:hover{color:#94a3b8}
.nav-title{color:#fff;font-size:13px;font-weight:700;padding:10px 16px;border-bottom:3px solid var(--accent);display:flex;align-items:center;gap:7px}
.nav-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:var(--accent);color:#000}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--soft);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:28px 24px}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.search{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;width:260px;outline:none}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--muted)}
.filter-tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--soft);cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-tag:hover,.filter-tag.on{background:var(--accent);color:#000;border-color:var(--accent)}
.count{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-img{width:100%;aspect-ratio:16/9;object-fit:contain;background:#111a2c;padding:8px;display:block}
.card-img.html-thumb{aspect-ratio:16/9;background:#111a2c;display:flex;align-items:center;justify-content:center;font-size:48px}
.card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-title{font-size:13px;font-weight:700;line-height:1.4}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cat-badge{font-size:9px;font-weight:700;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:3px;border:1px solid;white-space:nowrap}
.card-date{font-size:10px;color:var(--muted);margin-left:auto;font-family:'DM Mono',monospace}
.card-memo{font-size:11px;color:var(--soft);line-height:1.6;flex:1}

/* EMPTY */
.empty{text-align:center;padding:80px 24px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-text{font-size:14px;margin-bottom:8px;color:var(--soft)}
.empty-sub{font-size:12px}

/* MODAL: ADD */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px}
.form-row{margin-bottom:16px}
.form-label{font-size:11px;font-weight:600;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
.form-input,.form-textarea,.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .15s}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:80px}
.form-select{cursor:pointer}
.upload-area{border:2px dashed var(--border);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:rgba(143,195,31,.05)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:13px;color:var(--soft)}
.upload-sub{font-size:11px;color:var(--muted);margin-top:4px}
.preview-wrap{margin-top:12px;display:none}
.preview-wrap.show{display:block}
.preview-img{max-width:100%;max-height:200px;border-radius:6px;border:1px solid var(--border)}
.html-note{font-size:11px;color:var(--muted);margin-top:6px;padding:6px 10px;background:var(--surface2);border-radius:4px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.cat-pills{display:flex;flex-wrap:wrap;gap:6px}
.cat-pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;transition:all .15s;color:var(--soft);background:var(--surface2)}
.cat-pill.on{border-color:var(--accent);color:var(--accent);background:rgba(143,195,31,.1)}

/* MODAL: VIEWER */
.viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.viewer.hidden{display:none}
.viewer-close{position:fixed;top:16px;right:20px;font-size:28px;color:var(--soft);cursor:pointer;line-height:1;z-index:310}
.viewer-close:hover{color:#fff}
.viewer-content{max-width:90vw;max-height:85vh;overflow:auto;background:#0d1929;border-radius:8px;border:1px solid var(--border)}
.viewer-content img{display:block;max-width:100%;max-height:80vh;object-fit:contain}
.viewer-content iframe{width:90vw;height:80vh;border:none;border-radius:8px}
.viewer-info{margin-top:14px;text-align:center;max-width:600px}
.viewer-title{font-size:16px;font-weight:700;margin-bottom:6px}
.viewer-memo{font-size:12px;color:var(--soft);line-height:1.7}
.viewer-actions{display:flex;gap:8px;justify-content:center;margin-top:12px}

/* CATEGORIES color map */
.cat-biz{background:rgba(59,130,246,.12);color:#60a5fa;border-color:rgba(59,130,246,.3)}
.cat-ops{background:rgba(143,195,31,.12);color:#8fc31f;border-color:rgba(143,195,31,.3)}
.cat-strat{background:rgba(251,191,36,.12);color:#fbbf24;border-color:rgba(251,191,36,.3)}
.cat-tech{background:rgba(168,85,247,.12);color:#a855f7;border-color:rgba(168,85,247,.3)}
.cat-other{background:rgba(100,116,139,.12);color:#94a3b8;border-color:rgba(100,116,139,.3)}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-home">🏠 ポータル</a>
  <div class="nav-title">
    <div class="nav-icon">KEI</div>
    図解ライブラリ
  </div>
  <div class="nav-right">
    <button class="btn btn-primary" onclick="openAdd()">＋ 図を追加</button>
  </div>
</nav>

<div class="main">
  <div class="toolbar">
    <div class="toolbar-left">
      <input class="search" type="text" id="searchInput" placeholder="タイトル・メモで検索…" oninput="render()">
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="filterArea">
        <span class="filter-tag on" data-cat="">すべて</span>
        <span class="filter-tag" data-cat="biz">事業・財務</span>
        <span class="filter-tag" data-cat="ops">オペレーション</span>
        <span class="filter-tag" data-cat="strat">戦略・構想</span>
        <span class="filter-tag" data-cat="tech">テック・システム</span>
        <span class="filter-tag" data-cat="other">その他</span>
      </div>
    </div>
    <span class="count" id="countLabel"></span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty hidden" id="empty">
    <div class="empty-icon">🗂️</div>
    <div class="empty-text">まだ図がありません</div>
    <div class="empty-sub">「＋ 図を追加」から画像やHTMLを追加してください</div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="overlay hidden" id="addOverlay" onclick="e=>e.target===this&&closeAdd()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">📎 図を追加</div>

    <div class="form-row">
      <label class="form-label">タイトル *</label>
      <input class="form-input" id="addTitle" placeholder="例：3PL事業 収益構造">
    </div>

    <div class="form-row">
      <label class="form-label">カテゴリ</label>
      <div class="cat-pills" id="catPills">
        <div class="cat-pill on" data-val="biz">事業・財務</div>
        <div class="cat-pill" data-val="ops">オペレーション</div>
        <div class="cat-pill" data-val="strat">戦略・構想</div>
        <div class="cat-pill" data-val="tech">テック・システム</div>
        <div class="cat-pill" data-val="other">その他</div>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">メモ</label>
      <textarea class="form-textarea" id="addMemo" placeholder="気づき・補足・目的など"></textarea>
    </div>

    <div class="form-row">
      <label class="form-label">ファイル（画像 / HTML）</label>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*,.html,.htm,.svg" onchange="onFileSelect(this)">
        <div class="upload-icon">📁</div>
        <div class="upload-text">クリックまたはドラッグ&ドロップ</div>
        <div class="upload-sub">PNG / JPG / SVG / HTML 対応</div>
      </div>
      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" class="preview-img" src="" alt="">
        <div class="html-note" id="htmlNote" style="display:none">📄 HTMLファイル — 登録後にフルスクリーン表示されます</div>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">または URLを直接入力（画像URL）</label>
      <input class="form-input" id="addUrl" placeholder="https://..." oninput="onUrlInput(this)">
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAdd()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveItem()">追加する</button>
    </div>
  </div>
</div>

<!-- VIEWER MODAL -->
<div class="viewer hidden" id="viewer">
  <div class="viewer-close" onclick="closeViewer()">✕</div>
  <div class="viewer-content" id="viewerContent"></div>
  <div class="viewer-info">
    <div class="viewer-title" id="viewerTitle"></div>
    <div class="viewer-memo" id="viewerMemo"></div>
    <div class="viewer-actions">
      <button class="btn btn-ghost" onclick="deleteItem(currentId)">🗑 削除</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'kei_db_items';
let items = [];
let currentCat = '';
let currentId = null;

const CAT_LABEL = {biz:'事業・財務', ops:'オペレーション', strat:'戦略・構想', tech:'テック・システム', other:'その他'};
const CAT_CLASS  = {biz:'cat-biz', ops:'cat-ops', strat:'cat-strat', tech:'cat-tech', other:'cat-other'};

function load() {
  try { items = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { items = []; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = items.filter(it => {
    const matchCat = !currentCat || it.cat === currentCat;
    const matchQ = !q || it.title.toLowerCase().includes(q) || (it.memo||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  document.getElementById('countLabel').textContent = `${list.length} 件`;
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (list.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  grid.innerHTML = list.slice().reverse().map(it => `
    <div class="card" onclick="openViewer('${it.id}')">
      ${it.type==='html'
        ? `<div class="card-img html-thumb">📄</div>`
        : `<img class="card-img" src="${it.src}" alt="${it.title}" loading="lazy" onerror="this.style.opacity='.3'">`
      }
      <div class="card-body">
        <div class="card-title">${esc(it.title)}</div>
        <div class="card-meta">
          <span class="cat-badge ${CAT_CLASS[it.cat]||'cat-other'}">${CAT_LABEL[it.cat]||'その他'}</span>
          <span class="card-date">${it.date}</span>
        </div>
        ${it.memo ? `<div class="card-memo">${esc(it.memo)}</div>` : ''}
      </div>
    </div>`).join('');
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// FILTER
document.getElementById('filterArea').addEventListener('click', e => {
  const t = e.target.closest('.filter-tag');
  if (!t) return;
  document.querySelectorAll('.filter-tag').forEach(el => el.classList.remove('on'));
  t.classList.add('on');
  currentCat = t.dataset.cat;
  render();
});

// ADD MODAL
let addFileData = null;
let addFileSrc = null;
let addFileType = 'img';

function openAdd() {
  document.getElementById('addOverlay').classList.remove('hidden');
  document.getElementById('addTitle').value = '';
  document.getElementById('addMemo').value = '';
  document.getElementById('addUrl').value = '';
  document.getElementById('previewWrap').classList.remove('show');
  document.getElementById('previewImg').src = '';
  document.getElementById('htmlNote').style.display = 'none';
  addFileSrc = null; addFileType = 'img';
  document.querySelectorAll('.cat-pill').forEach((p,i) => p.classList.toggle('on', i===0));
}
function closeAdd() { document.getElementById('addOverlay').classList.add('hidden'); }

document.getElementById('addOverlay').addEventListener('click', function(e){
  if(e.target === this) closeAdd();
});

function onFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const isHtml = /\.(html|htm)$/i.test(file.name);
  const reader = new FileReader();
  reader.onload = e => {
    addFileSrc = e.target.result;
    addFileType = isHtml ? 'html' : 'img';
    document.getElementById('previewWrap').classList.add('show');
    document.getElementById('htmlNote').style.display = isHtml ? 'block' : 'none';
    document.getElementById('previewImg').style.display = isHtml ? 'none' : 'block';
    if (!isHtml) document.getElementById('previewImg').src = addFileSrc;
    if (!document.getElementById('addTitle').value && file.name)
      document.getElementById('addTitle').value = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g,' ');
  };
  reader.readAsDataURL(file);
}

function onUrlInput(input) {
  const url = input.value.trim();
  if (!url) { document.getElementById('previewWrap').classList.remove('show'); return; }
  addFileSrc = url; addFileType = 'img';
  document.getElementById('previewImg').src = url;
  document.getElementById('previewWrap').classList.add('show');
  document.getElementById('previewImg').style.display = 'block';
  document.getElementById('htmlNote').style.display = 'none';
}

function saveItem() {
  const title = document.getElementById('addTitle').value.trim();
  if (!title) { document.getElementById('addTitle').focus(); return; }
  const src = addFileSrc || document.getElementById('addUrl').value.trim();
  if (!src) { alert('画像またはHTMLファイルを選択してください'); return; }
  const cat = document.querySelector('.cat-pill.on')?.dataset.val || 'other';
  const memo = document.getElementById('addMemo').value.trim();
  const now = new Date();
  const date = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
  items.push({ id: Date.now().toString(), title, cat, memo, src, type: addFileType, date });
  save();
  closeAdd();
  render();
}

// VIEWER
function openViewer(id) {
  currentId = id;
  const it = items.find(x => x.id === id);
  if (!it) return;
  document.getElementById('viewerTitle').textContent = it.title;
  document.getElementById('viewerMemo').textContent = it.memo || '';
  const vc = document.getElementById('viewerContent');
  if (it.type === 'html') {
    vc.innerHTML = `<iframe srcdoc="${esc(atob(it.src.split(',')[1] || ''))}" sandbox="allow-scripts allow-same-origin"></iframe>`;
  } else {
    vc.innerHTML = `<img src="${it.src}" alt="${esc(it.title)}" style="max-width:88vw;max-height:80vh;object-fit:contain">`;
  }
  document.getElementById('viewer').classList.remove('hidden');
  document.addEventListener('keydown', onViewerKey);
}
function closeViewer() {
  document.getElementById('viewer').classList.add('hidden');
  document.getElementById('viewerContent').innerHTML = '';
  document.removeEventListener('keydown', onViewerKey);
}
function onViewerKey(e) { if(e.key==='Escape') closeViewer(); }

document.getElementById('viewer').addEventListener('click', function(e){
  if(e.target === this) closeViewer();
});

function deleteItem(id) {
  if (!confirm('この図を削除しますか？')) return;
  items = items.filter(x => x.id !== id);
  save(); closeViewer(); render();
}

// DRAG & DROP
const ua = document.getElementById('uploadArea');
ua.addEventListener('dragover', e => { e.preventDefault(); ua.classList.add('drag'); });
ua.addEventListener('dragleave', () => ua.classList.remove('drag'));
ua.addEventListener('drop', e => {
  e.preventDefault(); ua.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) { const fi = document.getElementById('fileInput'); fi.files = e.dataTransfer.files; onFileSelect(fi); }
});


// SEED: 初回のみlocalStorageに登録済みアイテムを注入
(function seedItems() {
  const SEED_KEY = 'kei_db_seed_v1';
  if (localStorage.getItem(SEED_KEY)) return;
  const existing = [];
  try { existing.push(...(JSON.parse(localStorage.getItem('kei_db_items')) || [])); } catch(e){}
  const seeds = [
    {
      id: '1747008000001',
      title: 'SBS即配 2026年7月値上げ — 前回の振り返りと今回の進め方',
